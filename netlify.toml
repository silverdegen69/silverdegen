[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://sdks.shopifycdn.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://sdks.shopifycdn.com; font-src https://fonts.gstatic.com https://sdks.shopifycdn.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://a.klaviyo.com https://formspree.io https://accounts.google.com https://*.myshopify.com https://5cpwg5-5v.myshopify.com https://monorail-edge.shopifysvc.com; frame-src https://js.stripe.com https://*.myshopify.com https://checkout.shopify.com; worker-src blob:;"
