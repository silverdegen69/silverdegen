<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silver Degen</title>
  <meta name="description" content="Live coin & bullion auctions. Gold Eagles, Morgans, slabbed silver. Every Wednesday & Saturday at 8PM EST on WhatNot." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --s1: #B8C8D4;
      --s2: #DCE8F0;
      --ink: #0C0E12;
      --white: #FFFFFF;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--ink);
      color: var(--white);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Background */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 40%, rgba(184,200,212,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(138,158,174,0.07) 0%, transparent 60%);
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; opacity: 0.03;
      background-image:
        linear-gradient(rgba(184,200,212,1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(184,200,212,1) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 32px; width: 100%; max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      width: 100px; height: 100px; object-fit: contain;
      filter: drop-shadow(0 0 28px rgba(184,200,212,0.3));
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    /* Name */
    h1 {
      font-family: var(--font-display);
      font-size: 2.4rem; letter-spacing: -0.02em; line-height: 1;
      margin-bottom: 8px;
      animation: fadeUp 0.6s ease 0.15s both;
    }
    h1 span { color: var(--s1); }

    /* Tagline */
    p {
      font-size: 0.9rem; color: rgba(255,255,255,0.45);
      text-align: center; line-height: 1.6; max-width: 280px;
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    /* Links */
    .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }

    .link-btn {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 24px; border-radius: 14px;
      text-decoration: none; font-weight: 600; font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--white);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.6s ease both;
    }
    .link-btn:hover {
      background: rgba(184,200,212,0.12);
      border-color: rgba(184,200,212,0.3);
      transform: translateY(-2px);
    }
    .link-btn:nth-child(1) { animation-delay: 0.25s; }
    .link-btn:nth-child(2) { animation-delay: 0.32s; }
    .link-btn:nth-child(3) { animation-delay: 0.39s; }

    .link-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 1.1rem;
    }
    .icon-whatnot { background: rgba(255,100,50,0.15); }
    .icon-x       { background: rgba(255,255,255,0.08); }
    .icon-tiktok  { background: rgba(100,220,200,0.1); }

    .link-text { flex: 1; }
    .link-label { display: block; font-size: 0.95rem; font-weight: 600; }
    .link-sub   { display: block; font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-top: 2px; font-weight: 400; }

    .link-arrow { color: rgba(255,255,255,0.25); font-size: 1rem; }

    /* Live badge */
    .live-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(184,200,212,0.1); border: 1px solid rgba(184,200,212,0.2);
      color: var(--s2); font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 100px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease 0.05s both;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #C0392B;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.6)} }

    /* Footer */
    .footer {
      margin-top: 36px; font-size: 0.72rem; color: rgba(255,255,255,0.2);
      animation: fadeUp 0.6s ease 0.45s both;
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>

<div class="card">
  <img class="logo" src="logo.png" alt="Silver Degen" />

  <div class="live-badge">
    <span class="live-dot"></span>
    Wed & Sat · 8PM EST
  </div>

  <h1>Silver<span>Degen</span></h1>
  <p>Live coin & bullion auctions. Gold Eagles, Morgans, slabbed silver — real metal, real wins.</p>

  <div class="links">
    <a class="link-btn" href="https://www.whatnot.com/user/silverdegen" target="_blank">
      <div class="link-icon icon-whatnot">🔴</div>
      <div class="link-text">
        <span class="link-label">Watch Live on WhatNot</span>
        <span class="link-sub">Auctions every Wed & Sat at 8PM EST</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://x.com/SilverDegen" target="_blank">
      <div class="link-icon icon-x">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </div>
      <div class="link-text">
        <span class="link-label">Follow on X</span>
        <span class="link-sub">@SilverDegen · 24k followers</span>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://www.tiktok.com/@silverdegen" target="_blank">
      <div class="link-icon icon-tiktok">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.76a4.85 4.85 0 01-1.01-.07z"/></svg>
      </div>
      <div class="link-text">
        <span class="link-label">Follow on TikTok</span>
        <span class="link-sub">@SilverDegen</span>
      </div>
      <span class="link-arrow">→</span>
    </a>
  </div>

  <div class="footer">© 2026 SilverDegen.com</div>
</div>

</body>
</html>
